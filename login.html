<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

     <!-- Навигационное меню -->
     <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">MyApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="login.html">Вход</a></li>
                    <li class="nav-item"><a class="nav-link active" href="signup.html">Регистрация</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow-sm p-4" style="max-width: 420px; width: 100%;">
            <div class="text-center mb-4">
                <h2>Вход</h2>
                <p class="text-muted">Войдите в свой аккаунт</p>
            </div>

            <form>
                <!-- Поле "Email" -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="example@mail.ru" required>
                </div>

                <!-- Поле "Пароль" -->
                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="password" placeholder="Введите пароль" required>
                </div>

                <!-- Чекбокс "Запомнить меня" и ссылка "Забыли пароль?" -->
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Запомнить меня</label>
                    </div>
                    <a href="#" class="text-decoration-none">Забыли пароль?</a>
                </div>

                <!-- Кнопка входа -->
                <button type="submit" class="btn btn-primary w-100">Войти</button>
            </form>

            <div class="text-center mt-3">
                <p>Нет аккаунта? <a href="signup.html">Зарегистрироваться</a></p>
            </div>
        </div>
    </div>
</body>
</html>
