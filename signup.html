<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Подключаем свой CSS для переопределения стилей (опционально) -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Контент будет здесь -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

     <!-- Навигационное меню -->
     <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">MyApp</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="login.html">Вход</a></li>
                    <li class="nav-item"><a class="nav-link active" href="signup.html">Регистрация</a></li>
                </ul>
            </div>
        </div>
    </nav>


    <div class="container d-flex justify-content-center align-items-center min-vh-100">
        <div class="card shadow-sm p-4" style="max-width: 480px; width: 100%;">
            <div class="text-center mb-4">
                <h2>Регистрация</h2>
                <p class="text-muted">Создайте аккаунт, чтобы начать</p>
            </div>
    
            <form>
                <!-- Поле "Имя" -->
                <div class="mb-3">
                    <label for="name" class="form-label">Имя</label>
                    <input type="text" class="form-control" id="name" placeholder="Введите ваше имя" required>
                </div>
    
                <!-- Поле "Email" -->
                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="example@mail.ru" required>
                </div>
    
                <!-- Поле "Пароль" -->
                <div class="mb-3">
                    <label for="password" class="form-label">Пароль</label>
                    <input type="password" class="form-control" id="password" placeholder="Придумайте пароль" required>
                </div>
    
                <!-- Поле "Подтверждение пароля" -->
                <div class="mb-3">
                    <label for="password_confirm" class="form-label">Подтвердите пароль</label>
                    <input type="password" class="form-control" id="password_confirm" placeholder="Повторите пароль" required>
                </div>
    
                <!-- Чекбокс "Согласие" -->
                <div class="mb-3 form-check">
                    <input type="checkbox" class="form-check-input" id="agreement" required>
                    <label class="form-check-label" for="agreement">Я принимаю условия обработки данных</label>
                </div>
    
                <!-- Кнопка отправки -->
                <button type="submit" class="btn btn-primary w-100">Зарегистрироваться</button>
            </form>
    
            <div class="text-center mt-3">
                <p>Уже есть аккаунт? <a href="login.html">Войти</a></p>
            </div>
        </div>
    </div>
    
</body>
</html>
